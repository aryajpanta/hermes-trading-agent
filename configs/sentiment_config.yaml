# Sentiment Analysis Configuration

sentiment_model:
  primary: "finbert"  # ProsusAI/finbert
  fallback: "vader"
  device: "cpu"  # or "cuda" if GPU available
  batch_size: 32

sources:
  rss:
    enabled: true
    feeds:
      - name: "Reuters Business"
        url: "https://news.google.com/rss/search?q=when:24h+business+OR+stocks+OR+markets&hl=en-US&gl=US&ceid=US:en"
      - name: "MarketWatch"
        url: "https://feeds.marketwatch.com/marketwatch/topstories/"
      - name: "CoinDesk"
        url: "https://www.coindesk.com/arc/outboundfeeds/rss/"
        
  reddit:
    enabled: true
    subreddits:
      - wallstreetbets
      - stocks
      - cryptocurrency
      - investing
    client_id: ""
    client_secret: ""
    user_agent: "TradingIntelligence/1.0"
    
  x:  # X / Twitter — no official API; two scraping backends
    enabled: true
    backend: "nitter"   # "nitter" (zero-install RSS) | "cli" (agent-reach twitter-cli)
    # Backend "nitter": public mirrors (often blocked); override via X_NITTER_INSTANCES.
    instances:
      - "https://nitter.net"
      - "https://nitter.poast.org"
      - "https://nitter.privacydev.net"
    # Backend "cli": agent-reach — pipx install twitter-cli + burner-account cookies.
    cli_bin: "twitter"  # or "opencli"
    # Optional high-signal finance accounts to also pull from (nitter backend).
    accounts:
      - "DeItaone"
      - "FirstSquawk"
      - "unusual_whales"
    max_age_hours: 24

scoring:
  engagement_weight: 0.3  # weight of engagement in final score
  recency_weight: 0.4  # weight of how recent the signal is
  source_weight: 0.3  # weight of source credibility

deduplication:
  similarity_threshold: 0.85  # cosine similarity for dedup
  time_window_hours: 24
