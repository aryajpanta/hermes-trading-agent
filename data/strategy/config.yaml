# ============================================================
# Hermes Trading Agent — Strategy Configuration
# ============================================================
# AGGRESSIVE MODE — Higher risk, more trades, faster positioning
# ============================================================

name: "Hermes Aggressive Multi-Asset Strategy"

# === Asset Universe ===
assets:
  - symbol: "BTC"
    assetClass: "crypto"
    weight: 0.30
  - symbol: "ETH"
    assetClass: "crypto"
    weight: 0.25
  - symbol: "SOL"
    assetClass: "crypto"
    weight: 0.20
  - symbol: "AAPL"
    assetClass: "stock"
    weight: 0.10
  - symbol: "SPY"
    assetClass: "stock"
    weight: 0.10
  - symbol: "EURUSD"
    assetClass: "forex"
    weight: 0.05

# === Goals ===
goals:
  minSharpe: 1.0            # Lower threshold to keep aggression
  maxDrawdown: 25            # Can tolerate more downside
  targetReturn30d: 25        # Higher return target
  minWinRate: 40             # Accept lower win rate for bigger wins
  maxConsecutiveLosses: 6

# === Indicator Parameters (Tighter = More Signals) ===
rsiPeriod: 10               # Faster RSI = more responsive
rsiOversold: 25             # Wider oversold range
rsiOverbought: 65           # Tighter overbought = more sell signals

macdFast: 8                 # Faster MACD
macdSlow: 21                # Shorter slow MA
macdSignal: 7               # Quicker signal line

bbPeriod: 16                # Shorter BB period
bbStdDev: 1.8               # Tighter bands = more breakouts

signalThreshold: 15         # Half default = way more trades

# === Risk Management (Aggressive) ===
riskPerTrade: 0.03          # 3% risk per trade (double default)
stopLossPct: 0.025          # 2.5% stop loss
riskRewardRatio: 2.5        # Target higher reward
volumeThreshold: 1.2        # Lower volume confirmation bar
maxOpenPositions: 8         # More simultaneous positions

# === Signal Weights (Heavier on momentum) ===
weights:
  smaCrossover: 20
  macdCrossover: 25
  macdMomentum: 10
  rsiOversold: 20
  rsiOverbought: 20
  rsiDivergence: 15
  bbOversold: 15
  bbOverbought: 15
  priceAboveSMA: 8
  volumeConfirmation: 8

# === Self-Improvement ===
selfImprove:
  reviewCadence: "daily"
  optimizeOneAtATime: true
  paperTrade: true
  liveTrading: false
  firstCycleReadOnly: false  # AUTO-OPTIMIZE — start learning immediately
